name: Build & Release LG3 App

on:
  push:
    tags:
      - '*' 
  workflow_dispatch:

jobs:
  build:
    name: Build APK and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Tải mã nguồn"
        uses: actions/checkout@v3

      - name: "☕ Cài đặt Java 17 (CÓ CACHE GRADLE ĐỂ CHẠY NHANH)"
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' 

      - name: "🦋 Cài đặt Flutter (CÓ CACHE FLUTTER)"
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true 

      - name: "📦 Cài thư viện phụ thuộc"
        run: flutter pub get

      # --- BƯỚC NÀY LẦN TRƯỚC SẾP QUÊN CHƯA CHO VÀO NÀY ---
      - name: "🔐 Giải mã Chữ ký số LG3"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > android/app/lg3-release.jks
          echo "storePassword=$STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=lg3-release.jks" >> android/key.properties
      # ----------------------------------------------------

      - name: "🚀 1. Build bản Split"
        run: flutter build apk --split-per-abi

      - name: "🔧 2. Ma thuật DevOps: Xóa đuôi _r1"
        run: |
          sed -i 's/_r1";/";/g' lib/main.dart

      - name: "🚀 3. Build bản Universal"
        run: flutter build apk

      - name: "🏷️ Đổi tên file cho chuẩn API"
        run: |
          cd build/app/outputs/flutter-apk/
          mv app-arm64-v8a-release.apk LG3_TVTL_QLNN_Android_arm64-v8a.apk
          mv app-armeabi-v7a-release.apk LG3_TVTL_QLNN_Android_armeabi-v7a.apk
          mv app-release.apk LG3_TVTL_QLNN_Android.apk

      - name: "📤 Ép đẩy file lên Release GitHub"
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/LG3_TVTL_QLNN_Android_arm64-v8a.apk
            build/app/outputs/flutter-apk/LG3_TVTL_QLNN_Android_armeabi-v7a.apk
            build/app/outputs/flutter-apk/LG3_TVTL_QLNN_Android.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}